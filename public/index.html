<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />

	<!-- 🚀 CRITICAL: Preload the LCP banner (WebP) and Logo FIRST -->
	<link rel="preload" as="image" href="/bannerimage.webp" imagesrcset="/bannerimage_mobile.webp 600w, /bannerimage.webp 1200w" imagesizes="(max-width: 767px) 600px, 1200px" fetchpriority="high" />
	<link rel="preload" as="image" href="%PUBLIC_URL%/logo.png" fetchpriority="high" />

	<!-- ⚡ CRITICAL CSS: Fixes the 10.5s 'White Screen' by instantly painting the header and banner area -->
	<style>
		:root { --cndu-pink: #f299c2; }
		body { margin: 0; font-family: 'Open Sans', sans-serif; }
		.header { height: 75px; background: linear-gradient(90deg, #fff 0%, var(--cndu-pink) 100%); display: block; }
		.sale-banner { width: 100%; aspect-ratio: 1200 / 400; background: #f0f0f0; overflow: hidden; display: block; }
		.sale-banner__image { width: 100%; height: auto; display: block; }
	</style>

	<link rel="icon" href="%PUBLIC_URL%/cndu-favicon-150x150.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="theme-color" content="#000000" />
	<meta name="description" content="CNDU Fabrics — Shop sarees, fabrics & blouses online" />
	<link rel="apple-touch-icon" href="%PUBLIC_URL%/cndu-favicon-150x150.png" />
	<link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

	<!-- Preconnect to external services to save DNS/SSL time -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="preconnect" href="https://backend.cndu.in" />
	<link rel="preconnect" href="https://mercury-t2.phonepe.com" />

	<!-- Load only Open Sans (the font actually used) with display=swap to prevent render-blocking -->
	<link
		href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap"
		rel="stylesheet" />

	<!-- Google Maps script moved to Reviews.js to avoid initial load blocking -->

	<title>CNDU Fabrics</title>
</head>

<body>
	<noscript>You need to enable JavaScript to run this app.</noscript>
	<div id="root">
		<!-- 🦴 INLINE SKELETON: Visible instantly before JS loads -->
		<div style="width: 100%; display: flex; flex-direction: column; gap: 40px; padding-bottom: 50px; background-color: #fff;">
			
			<!-- Header Placeholder -->
			<div style="height: 75px; background: #fff; border-bottom: 1px solid #f0f0f0; width: 100%; display: flex; align-items: center; padding: 0 5%; box-sizing: border-box;">
				<div style="width: 120px; height: 35px; background: #fce4ec; border-radius: 4px;"></div>
			</div>

			<style>
				@keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
				.skeleton-base-inline { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 1000px 100%; animation: shimmer 2s infinite linear; }
				.skeleton-cards-inline { display: flex; justify-content: center; align-items: center; gap: 4%; flex-wrap: wrap; padding: 0 5%; margin-top: 30px; }
				.skeleton-card-inline { width: 300px; height: 400px; border-radius: 10px; margin-bottom: 20px; }
				@media (max-width: 768px) { .skeleton-banner-inline { height: 30vh !important; } .skeleton-cards-inline { gap: 20px; } .skeleton-card-inline { width: 100%; max-width: 350px; height: 350px; } }
			</style>

			<!-- Banner Placeholder -->
			<div class="skeleton-base-inline skeleton-banner-inline" style="width: 100%; height: 50vh; min-height: 300px; margin-top: -40px;"></div>

			<!-- Section 2 (New Arrivals) Placeholder -->
			<div style="margin-top: 20px;">
				<div class="skeleton-base-inline" style="width: 250px; height: 30px; border-radius: 4px; margin: 0 auto;"></div>
				<div class="skeleton-cards-inline">
					<div class="skeleton-base-inline skeleton-card-inline"></div>
					<div class="skeleton-base-inline skeleton-card-inline"></div>
					<div class="skeleton-base-inline skeleton-card-inline"></div>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
