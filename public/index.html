<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />

	<!-- 🚀 CRITICAL: Preload the LCP banner and Logo FIRST -->
	<link rel="preload" as="image" href="/bannerimage.jpeg" imagesrcset="/bannerimage_mobile.jpeg 600w, /bannerimage.jpeg 1200w" imagesizes="(max-width: 767px) 600px, 1200px" fetchpriority="high" />
	<link rel="preload" as="image" href="%PUBLIC_URL%/cndu-logo.png" fetchpriority="high" />

	<!-- ⚡ CRITICAL CSS: Fixes the 10.5s 'White Screen' by instantly painting the header and banner area -->
	<style>
		:root { --cndu-pink: #f299c2; }
		body { margin: 0; font-family: 'Open Sans', sans-serif; }
		.header { height: 75px; background: linear-gradient(90deg, #fff 0%, var(--cndu-pink) 100%); display: block; }
		.sale-banner { width: 100%; aspect-ratio: 1200 / 400; background: #f0f0f0; overflow: hidden; display: block; }
		.sale-banner__image { width: 100%; height: auto; display: block; }
	</style>

	<link rel="icon" href="%PUBLIC_URL%/cndu-favicon-150x150.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="theme-color" content="#000000" />
	<meta name="description" content="CNDU Fabrics — Shop sarees, fabrics & blouses online" />
	<link rel="apple-touch-icon" href="%PUBLIC_URL%/cndu-favicon-150x150.png" />
	<link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

	<!-- Preconnect to external services to save DNS/SSL time -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="preconnect" href="https://backend.cndu.in" />
	<link rel="preconnect" href="https://mercury-t2.phonepe.com" />

	<!-- Load only Open Sans (the font actually used) with display=swap to prevent render-blocking -->
	<link
		href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap"
		rel="stylesheet" />

	<!-- Google Maps script moved to Reviews.js to avoid initial load blocking -->

	<title>CNDU Fabrics</title>
</head>

<body>
	<noscript>You need to enable JavaScript to run this app.</noscript>
	<div id="root"></div>
</body>

</html>
